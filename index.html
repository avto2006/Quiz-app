<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/javascript-logo-svgrepo-com.svg">
    <title>Js Quiz</title>
</head>
<body>
    
   <main>
       <img class="img" src="img/javascript-logo-svgrepo-com.svg" alt="">
       <h2 class="h2">Welcome to the js quiz <br> You have to answer 5 questions.</h2>
       <button onclick="func1()"  class="startBtn">Start Quiz</button>

        <section class="questionsArea">
              <div class="qst1">
                   <img src="questions/question1.png" alt="">
                   <h3>What will be the result?</h3>
                   <button onclick="func2()"  class="answer false1">4</button>
                   <button onclick="func2()" class="answer right1">"22"</button>
                   <button onclick="func2()" class="answer false2">NaN</button>
                   <button onclick="func2()"  class="answer false3">Error</button>
              </div>
              <div class="qst2">
                        <img src="questions/question2.png" alt="">
                   <h3>What will be the result?</h3>
                   <button onclick="func4()" class="answer false4">5 5</button>
                   <button onclick="func4()"  class="answer right2">6 5</button>
                   <button onclick="func4()"  class="answer false5">6 6</button>
                   <button onclick="func4()"  class="answer false6">5 6</button>
              </div>
              <div class="qst3">
                   <img src="questions/question3.png" alt="">
                   <h3>What will be the result?</h3>
                   <button onclick="func6()" class="answer false7">"null"</button>
                   <button onclick="func6()" class="answer false8">Error</button>
                   <button onclick="func6()" class="answer false9">"undefined"</button>
                   <button onclick="func6()" class="answer right3">"Object"</button>
              </div>
              <div class="qst4">
                 <img src="questions/question4.png" alt="">
                   <h3>What will be the result?</h3>
                   <button onclick="func8()" class="answer false10">[1, 2, 3]</button>
                   <button onclick="func8()" class="answer false11">Error</button>
                   <button onclick="func8()" class="answer right4">[1, 2, 3, 4]</button>
                   <button onclick="func8()" class="answer false12">undefined</button>
              </div>
              <div class="qst5">
                 <img src="questions/question5.png" alt="">
                   <h3>What will be the result?</h3>
                   <button onclick="func10()" class="answer false13">10</button>
                   <button onclick="func10()" class="answer right5">undefined</button>
                   <button onclick="func10()" class="answer false14">Error</button>
                   <button onclick="func10()" class="answer false15">null</button>
              </div>
             
        </section>

        <button onclick="func3()" class="next">Next</button>
        <button onclick="func5()" class="next nx2">Next</button>
        <button onclick="func7()" class="next nx3">Next</button>
        <button onclick="func9()" class="next nx4">Next</button>
        <button onclick="func9()" class="next nx5">See Result</button>


        
        
    
    <script src="main.js"></script>
</body>
</html>
